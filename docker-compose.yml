# =============================================
# docker-compose.yml — Auto DayTrading Bot
# =============================================
# Uso local (dev):     docker compose up --build
# Uso en VPS (prod):   docker compose up -d --build
#
# Ambos servicios leen credenciales desde .env (nunca hardcodeadas).

services:

  # -------------------------------------------
  # Servicio 1: Bot de Trading Automatizado
  # -------------------------------------------
  tradingbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradingbot:latest
    restart: unless-stopped        # Se reinicia automáticamente en el VPS si el proceso muere
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs           # Logs persistentes en el host (no se pierden al recrear el contenedor)
    environment:
      - PYTHONUNBUFFERED=1

